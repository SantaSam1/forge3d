<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060b14"/>
      <stop offset="100%" style="stop-color:#0d1424"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1"/>
    </linearGradient>
    <radialGradient id="center" cx="60%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#060b14;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow circle -->
  <circle cx="820" cy="315" r="280" fill="url(#center)" filter="url(#blur)"/>
  
  <!-- Grid lines -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 3D Cube wireframe -->
  <g transform="translate(820, 290)" opacity="0.9">
    <!-- Back face -->
    <polygon points="80,-140 220,-60 220,100 80,20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
    <!-- Bottom face -->
    <polygon points="-60,20 80,100 220,20 80,-60" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
    <!-- Front face -->
    <polygon points="-60,-140 80,-60 80,100 -60,20" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-width="2.5"/>
    <!-- Top face -->
    <polygon points="-60,-140 80,-220 220,-140 80,-60" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-width="2.5"/>
    <!-- Right face -->
    <polygon points="80,-220 220,-140 220,20 80,-60" fill="#06b6d4" fill-opacity="0.06" stroke="#06b6d4" stroke-width="2.5"/>
    <!-- Edges glow -->
    <line x1="-60" y1="-140" x2="-60" y2="20" stroke="#22d3ee" stroke-width="3" opacity="0.8"/>
    <line x1="-60" y1="-140" x2="80" y2="-220" stroke="#22d3ee" stroke-width="3" opacity="0.8"/>
    <line x1="80" y1="-220" x2="220" y2="-140" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <line x1="220" y1="-140" x2="220" y2="20" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="700" cy="120" r="3" fill="#06b6d4" opacity="0.8"/>
  <circle cx="750" cy="180" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="660" cy="200" r="1.5" fill="#22d3ee" opacity="0.6"/>
  <circle cx="950" cy="150" r="2.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="1050" cy="420" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="680" cy="480" r="1.5" fill="#22d3ee" opacity="0.4"/>

  <!-- Logo -->
  <g transform="translate(80, 72)">
    <rect width="44" height="44" rx="12" fill="#06b6d4" opacity="0.2"/>
    <rect width="44" height="44" rx="12" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <text x="22" y="30" text-anchor="middle" font-size="22" fill="#06b6d4">⬡</text>
  </g>
  <text x="136" y="102" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="22" font-weight="600" fill="white" opacity="0.9">3D-Prin</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">Создавай 3D</text>
  <text x="80" y="350" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="72" font-weight="700" fill="#06b6d4">мгновенно с ИИ</text>

  <!-- Subtitle -->
  <text x="80" y="415" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="26" fill="#94a3b8">Генерируй GLB, OBJ и STL файлы из текста</text>

  <!-- Badges -->
  <rect x="80" y="460" width="160" height="44" rx="22" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="160" y="488" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#06b6d4">✦ ИИ-генерация</text>
  
  <rect x="256" y="460" width="140" height="44" rx="22" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="326" y="488" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#a78bfa">✦ AR / VR</text>

  <rect x="412" y="460" width="160" height="44" rx="22" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="492" y="488" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#34d399">✦ Бесплатно</text>

  <!-- Bottom URL -->
  <text x="80" y="580" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="18" fill="#475569">3d-prin.ru</text>
</svg>
